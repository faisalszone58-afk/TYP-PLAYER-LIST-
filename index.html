<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TYP Championship — Admin Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #B8860B;
    --gold-light: #D4A843;
    --gold-bg: rgba(184,134,11,0.08);
    --gold-border: rgba(184,134,11,0.3);
    --red: #CC3333;
    --red-bg: rgba(204,51,51,0.08);
    --red-border: rgba(204,51,51,0.35);
    --green: #1A7A3C;
    --green-bg: rgba(26,122,60,0.08);
    --bg: #FFFFFF;
    --surface: #F7F7F8;
    --surface-2: #EFEFEF;
    --border: #E0E0E0;
    --text-1: #111111;
    --text-2: #444444;
    --text-3: #888888;
  }

  body {
    background: var(--bg);
    color: var(--text-1);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    padding: 0;
  }

  /* ── Top Header ── */
  .admin-header {
    background: linear-gradient(135deg, #0a2a1a 0%, #0f3d25 40%, #1a5c35 100%);
    color: #fff;
    padding: 1.2rem 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 3px solid var(--gold-light);
  }

  .admin-header-left {
    display: flex;
    align-items: center;
    gap: 0.9rem;
  }

  .trophy { font-size: 1.6rem; line-height:1; }

  .admin-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.8rem;
    letter-spacing: 0.08em;
    color: var(--gold-light);
    line-height: 1;
  }

  .admin-subtitle {
    font-size: 0.68rem;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.45);
    margin-top: 0.15rem;
  }

  .header-meta {
    display: flex;
    align-items: center;
    gap: 1.5rem;
  }

  .global-total-label {
    font-size: 0.65rem;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.45);
    margin-bottom: 0.2rem;
  }

  .global-total-val {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--gold-light);
  }

  /* Global Total Points input */
  .global-total-wrap {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
  }

  .global-total-input {
    background: transparent;
    border: none;
    outline: none;
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--gold-light);
    width: 100px;
    text-align: right;
    caret-color: var(--gold-light);
    -moz-appearance: textfield;
  }
  .global-total-input::-webkit-outer-spin-button,
  .global-total-input::-webkit-inner-spin-button { -webkit-appearance: none; }
  .global-total-input::placeholder { color: rgba(255,255,255,0.25); }

  /* ── Reset / Download bar ── */
  .action-bar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0.6rem 2rem;
    display: flex;
    align-items: center;
    gap: 0.75rem;
    flex-wrap: wrap;
  }

  .action-bar-label {
    font-size: 0.7rem;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-3);
    margin-right: 0.5rem;
  }

  .bar-btn {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--text-2);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.78rem;
    font-weight: 500;
    padding: 0.45rem 1.1rem;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s, background 0.15s;
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
  }

  .bar-btn:hover { border-color: var(--gold-border); color: var(--gold); background: var(--gold-bg); }
  .bar-btn.danger:hover { border-color: var(--red-border); color: var(--red); background: var(--red-bg); }

  /* ── Grid of manager cards ── */
  .managers-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0;
    border-left: 1px solid var(--border);
    border-top: 1px solid var(--border);
  }

  @media (max-width: 1100px) { .managers-grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 600px)  { .managers-grid { grid-template-columns: 1fr; } }

  /* ── Single Manager Card ── */
  .manager-card {
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    padding: 0;
    display: flex;
    flex-direction: column;
    background: #fff;
    transition: background 0.15s;
  }

  .card-head {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0.75rem 1rem;
    display: flex;
    align-items: center;
    gap: 0.6rem;
  }

  .card-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    font-weight: 600;
    color: var(--text-3);
    background: var(--surface-2);
    border-radius: 5px;
    padding: 2px 7px;
    letter-spacing: 0.08em;
    flex-shrink: 0;
  }

  .card-name-input {
    background: transparent;
    border: none;
    outline: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.92rem;
    font-weight: 600;
    color: var(--text-1);
    flex: 1;
    caret-color: var(--gold);
  }
  .card-name-input::placeholder { color: var(--text-3); font-weight: 400; }

  /* Coin stats row */
  .card-stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
    border-bottom: 1px solid var(--border);
  }

  .stat-box {
    padding: 0.7rem 1rem;
    border-right: 1px solid var(--border);
    position: relative;
  }
  .stat-box:last-child { border-right: none; }

  .stat-label {
    font-size: 0.6rem;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-3);
    margin-bottom: 0.3rem;
  }

  .stat-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--text-1);
  }

  .stat-value.gold { color: var(--gold); }
  .stat-value.red  { color: var(--red); }
  .stat-value.green { color: var(--green); }

  /* Total input inline */
  .total-inline-input {
    background: transparent;
    border: none;
    outline: none;
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--gold);
    width: 100%;
    caret-color: var(--gold);
    -moz-appearance: textfield;
  }
  .total-inline-input::-webkit-outer-spin-button,
  .total-inline-input::-webkit-inner-spin-button { -webkit-appearance: none; }
  .total-inline-input::placeholder { color: var(--text-3); font-weight: 400; font-size: 0.95rem; }

  /* ── Player rows inside card ── */
  .card-players { flex: 1; }

  .player-head {
    display: grid;
    grid-template-columns: 1.8rem 1fr 5rem;
    gap: 0;
    padding: 0.4rem 1rem;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }

  .player-head span {
    font-size: 0.6rem;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-3);
  }
  .player-head span:last-child { text-align: right; }

  .p-row {
    display: grid;
    grid-template-columns: 1.8rem 1fr 5rem;
    gap: 0;
    align-items: center;
    padding: 0.35rem 1rem;
    border-bottom: 1px solid var(--border);
  }
  .p-row:last-child { border-bottom: none; }
  .p-row:hover { background: var(--surface); }

  .p-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    color: var(--text-3);
    font-weight: 600;
  }

  .p-name-input {
    background: transparent;
    border: none;
    outline: none;
    color: var(--text-1);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    font-weight: 500;
    width: 100%;
    caret-color: var(--gold);
  }
  .p-name-input::placeholder { color: var(--text-3); font-weight: 400; font-size: 0.78rem; }

  .p-coin-wrap {
    display: flex;
    justify-content: flex-end;
    align-items: center;
    gap: 0.3rem;
  }

  .p-coin-sym {
    font-size: 0.65rem;
    color: var(--text-3);
  }

  .p-coin-input {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 5px;
    outline: none;
    color: var(--text-1);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem;
    font-weight: 600;
    text-align: right;
    padding: 0.25rem 0.45rem;
    width: 68px;
    -moz-appearance: textfield;
    transition: border-color 0.12s;
    caret-color: var(--gold);
  }
  .p-coin-input::-webkit-outer-spin-button,
  .p-coin-input::-webkit-inner-spin-button { -webkit-appearance: none; }
  .p-coin-input:focus { border-color: var(--gold-border); background: var(--gold-bg); }
  .p-coin-input::placeholder { color: var(--text-3); font-weight: 400; }

  /* allocated footer */
  .card-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.55rem 1rem;
    background: var(--surface);
    border-top: 2px solid var(--border);
  }

  .footer-label {
    font-size: 0.62rem;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-3);
  }

  .footer-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.88rem;
    font-weight: 600;
    color: var(--text-1);
  }

  /* exceeded state */
  .manager-card.exceeded .card-stats { background: var(--red-bg); }
  .manager-card.exceeded .stat-value.remaining { color: var(--red) !important; }


  /* ── Lock / Edit Mode ── */
  .lock-badge {
    margin-left: auto;
    display: inline-flex;
    align-items: center;
    gap: 0.45rem;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    padding: 0.45rem 1.1rem;
    border-radius: 7px;
    border: 1.5px solid;
    cursor: pointer;
    transition: all 0.15s;
    background: #fff;
  }
  .lock-badge.locked {
    border-color: var(--red-border);
    color: var(--red);
    background: var(--red-bg);
  }
  .lock-badge.unlocked {
    border-color: var(--green);
    color: var(--green);
    background: var(--green-bg);
  }
  /* Disable inputs when locked */
  body.view-only input {
    pointer-events: none;
    user-select: none;
    color: var(--text-1);
    opacity: 1;
  }
  body.view-only input::placeholder { color: var(--text-3); }
  body.view-only .bar-btn:not(#lockBtn) { opacity: 0.38; pointer-events: none; }

  /* Firebase status dot */
  .fb-dot {
    display: inline-block;
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #aaa;
    margin-right: 0.3rem;
    transition: background 0.3s;
  }
  .fb-dot.ok { background: #22c55e; }
  .fb-dot.err { background: var(--red); }
  .fb-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.12em;
    color: var(--text-3);
  }

  /* Password modal */
  .pw-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 999;
    align-items: center;
    justify-content: center;
  }
  .pw-overlay.show { display: flex; }
  .pw-box {
    background: #fff;
    border-radius: 14px;
    padding: 2rem 2.2rem;
    min-width: 320px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.18);
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }
  .pw-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem;
    letter-spacing: 0.08em;
    color: var(--text-1);
  }
  .pw-input {
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 0.6rem 0.9rem;
    font-family: 'JetBrains Mono', monospace;
    font-size: 1rem;
    outline: none;
    transition: border-color 0.15s;
    width: 100%;
  }
  .pw-input:focus { border-color: var(--gold-border); }
  .pw-input.wrong { border-color: var(--red); animation: shake 0.3s; }
  @keyframes shake {
    0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)}
  }
  .pw-row { display: flex; gap: 0.6rem; }
  .pw-btn {
    flex: 1; padding: 0.55rem; border-radius: 8px;
    font-family: 'DM Sans', sans-serif; font-size: 0.88rem; font-weight: 600;
    cursor: pointer; border: 1.5px solid; transition: all 0.13s;
  }
  .pw-btn.confirm { background: var(--gold); border-color: var(--gold); color: #fff; }
  .pw-btn.confirm:hover { background: var(--gold-light); border-color: var(--gold-light); }
  .pw-btn.cancel { background: #fff; border-color: var(--border); color: var(--text-2); }
  .pw-btn.cancel:hover { border-color: var(--red-border); color: var(--red); background: var(--red-bg); }
  .pw-hint { font-size: 0.7rem; color: var(--text-3); font-family: 'JetBrains Mono', monospace; }
  /* ── Page footer ── */
  .page-footer {
    text-align: center;
    padding: 1.5rem;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-3);
    border-top: 1px solid var(--border);
    margin-top: 0;
  }
</style>
</head>

<script>
// ── Firebase Config ── (replace with YOUR config)
const firebaseConfig = {
  apiKey: "AIzaSyDjJ2VeApQLcZZJK8gJIUv9XfCnW_Vj9eU",
  authDomain: "typ-chapm.firebaseapp.com",
  databaseURL: "https://typ-chapm-default-rtdb.firebaseio.com",
  projectId: "typ-chapm",
  storageBucket: "typ-chapm.firebasestorage.app",
  messagingSenderId: "458844107492",
  appId: "1:458844107492:web:78725241c1b5a7c80132f1",
  measurementId: "G-D4N1KH50CE"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const DATA_REF = db.ref('typ_admin_dashboard/v1');

// ── Password (change this!) ──
const ADMIN_PASSWORD = "TYP2025";

// ── State ──
const NUM_MANAGERS = 8;
const NUM_PLAYERS  = 11;
let isUnlocked = false;

// ── Firebase status ──────────────────────────────────
function setFbStatus(ok) {
  const dot = document.getElementById('fbDot');
  const lbl = document.getElementById('fbLabel');
  dot.className = 'fb-dot ' + (ok ? 'ok' : 'err');
  lbl.textContent = ok ? 'firebase synced' : 'offline – local only';
}

// ── Lock / Unlock ─────────────────────────────────────
function handleLockClick() {
  if (isUnlocked) {
    lockEditor();
  } else {
    openPwModal();
  }
}

function openPwModal() {
  document.getElementById('pwOverlay').classList.add('show');
  setTimeout(() => document.getElementById('pwInput').focus(), 80);
}

function closePwModal() {
  document.getElementById('pwOverlay').classList.remove('show');
  const inp = document.getElementById('pwInput');
  inp.value = '';
  inp.classList.remove('wrong');
}

function checkPassword() {
  const inp = document.getElementById('pwInput');
  if (inp.value === ADMIN_PASSWORD) {
    closePwModal();
    unlockEditor();
  } else {
    inp.classList.add('wrong');
    setTimeout(() => inp.classList.remove('wrong'), 500);
    inp.value = '';
  }
}

function unlockEditor() {
  isUnlocked = true;
  document.body.classList.remove('view-only');
  const btn = document.getElementById('lockBtn');
  btn.className = 'lock-badge unlocked';
  btn.textContent = '🔓 Editing';
}

function lockEditor() {
  isUnlocked = false;
  document.body.classList.add('view-only');
  const btn = document.getElementById('lockBtn');
  btn.className = 'lock-badge locked';
  btn.textContent = '🔒 View Only';
}

// Enter key on password input
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('pwInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') checkPassword();
    if (e.key === 'Escape') closePwModal();
  });
  // Click outside modal to close
  document.getElementById('pwOverlay').addEventListener('click', e => {
    if (e.target === document.getElementById('pwOverlay')) closePwModal();
  });
  // Start locked
  lockEditor();
});

// ── Data (Firebase primary, localStorage fallback) ────
function defaultData() {
  return {
    globalTotal: '',
    managers: Array.from({ length: NUM_MANAGERS }, (_, m) => ({
      name: '',
      total: '',
      players: Array.from({ length: NUM_PLAYERS }, () => ({ name: '', coins: '' }))
    }))
  };
}

function loadData() {
  try {
    const raw = localStorage.getItem('typ_admin_v1');
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return defaultData();
}

function getCurrentData() {
  return {
    globalTotal: document.getElementById('globalTotal').value,
    managers: Array.from({ length: NUM_MANAGERS }, (_, m) => ({
      name: document.getElementById(`mname-${m}`).value,
      total: document.getElementById(`mtotal-${m}`).value,
      players: Array.from({ length: NUM_PLAYERS }, (__, p) => ({
        name:  document.getElementById(`pname-${m}-${p}`).value,
        coins: document.getElementById(`pcoin-${m}-${p}`).value
      }))
    }))
  };
}

let saveTimer = null;
function saveData() {
  if (!isUnlocked) return; // only save when editing
  const data = getCurrentData();
  // Always save to localStorage as fallback
  try { localStorage.setItem('typ_admin_v1', JSON.stringify(data)); } catch(e) {}
  // Debounce Firebase save (500ms)
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    DATA_REF.set(data)
      .then(() => setFbStatus(true))
      .catch(() => setFbStatus(false));
  }, 500);
}

// ── Firebase realtime listener ────────────────────────
function startFirebaseSync() {
  DATA_REF.on('value', (snapshot) => {
    const data = snapshot.val();
    if (data) {
      loadIntoUI(data);
      recalcAll();
      try { localStorage.setItem('typ_admin_v1', JSON.stringify(data)); } catch(e) {}
      setFbStatus(true);
    } else {
      // No data in Firebase yet — push local data
      const local = loadData();
      loadIntoUI(local);
      recalcAll();
      if (local.managers.some(m => m.name || m.total)) {
        DATA_REF.set(local).then(() => setFbStatus(true)).catch(() => setFbStatus(false));
      }
    }
  }, (err) => {
    console.warn('Firebase read error:', err);
    setFbStatus(false);
    // Fallback to localStorage
    const local = loadData();
    loadIntoUI(local);
    recalcAll();
  });
}

// ── Build DOM ─────────────────────────────────────────
function buildGrid() {
  const grid = document.getElementById('managersGrid');
  grid.innerHTML = '';
  for (let m = 0; m < NUM_MANAGERS; m++) {
    const card = document.createElement('div');
    card.className = 'manager-card';
    card.id = `mcard-${m}`;

    // Header
    card.innerHTML = `
      <div class="card-head">
        <span class="card-num">M${String(m+1).padStart(2,'0')}</span>
        <input type="text" id="mname-${m}" class="card-name-input"
          placeholder="Manager ${m+1}" maxlength="40" autocomplete="off">
      </div>
      <div class="card-stats">
        <div class="stat-box">
          <div class="stat-label">🪙 Total Coins</div>
          <input type="number" id="mtotal-${m}" class="total-inline-input"
            placeholder="——" min="0" autocomplete="off">
        </div>
        <div class="stat-box">
          <div class="stat-label">Remaining</div>
          <div class="stat-value gold remaining" id="mremain-${m}">—</div>
        </div>
      </div>
      <div class="card-players">
        <div class="player-head">
          <span>#</span><span>Player</span><span style="text-align:right">Coins</span>
        </div>
        <div id="pbody-${m}"></div>
      </div>
      <div class="card-footer">
        <span class="footer-label">🪙 Allocated</span>
        <span class="footer-value" id="malloc-${m}">0</span>
      </div>
    `;
    grid.appendChild(card);

    // Player rows
    const pbody = document.getElementById(`pbody-${m}`);
    for (let p = 0; p < NUM_PLAYERS; p++) {
      const row = document.createElement('div');
      row.className = 'p-row';
      row.innerHTML = `
        <span class="p-num">${String(p+1).padStart(2,'0')}</span>
        <input type="text" id="pname-${m}-${p}" class="p-name-input"
          placeholder="Player ${p+1}" maxlength="30" autocomplete="off">
        <div class="p-coin-wrap">
          <span class="p-coin-sym">🪙</span>
          <input type="number" id="pcoin-${m}-${p}" class="p-coin-input"
            placeholder="0" min="0">
        </div>
      `;
      pbody.appendChild(row);

      document.getElementById(`pname-${m}-${p}`).addEventListener('input', saveData);
      document.getElementById(`pcoin-${m}-${p}`).addEventListener('input', () => { recalcManager(m); saveData(); });
    }

    document.getElementById(`mname-${m}`).addEventListener('input', saveData);
    document.getElementById(`mtotal-${m}`).addEventListener('input', () => { recalcManager(m); saveData(); });
  }
}

// ── Recalculate one manager ───────────────────────────
function recalcManager(m) {
  let allocated = 0;
  for (let p = 0; p < NUM_PLAYERS; p++) {
    const v = parseFloat(document.getElementById(`pcoin-${m}-${p}`).value);
    if (!isNaN(v)) allocated += v;
  }

  document.getElementById(`malloc-${m}`).textContent = allocated.toLocaleString();

  const totalRaw = parseFloat(document.getElementById(`mtotal-${m}`).value);
  const remEl  = document.getElementById(`mremain-${m}`);
  const card   = document.getElementById(`mcard-${m}`);

  if (isNaN(totalRaw)) {
    remEl.textContent = '—';
    remEl.className = 'stat-value gold remaining';
    card.classList.remove('exceeded');
    return;
  }

  const remaining = totalRaw - allocated;
  remEl.textContent = remaining.toLocaleString();

  if (remaining < 0) {
    remEl.className = 'stat-value red remaining';
    card.classList.add('exceeded');
  } else if (remaining === 0) {
    remEl.className = 'stat-value green remaining';
    card.classList.remove('exceeded');
  } else {
    remEl.className = 'stat-value gold remaining';
    card.classList.remove('exceeded');
  }
}

function recalcAll() {
  for (let m = 0; m < NUM_MANAGERS; m++) recalcManager(m);
}

// ── Load into UI ──────────────────────────────────────
function loadIntoUI(data) {
  document.getElementById('globalTotal').value = data.globalTotal || '';
  data.managers.forEach((mgr, m) => {
    document.getElementById(`mname-${m}`).value  = mgr.name  || '';
    document.getElementById(`mtotal-${m}`).value = mgr.total || '';
    mgr.players.forEach((p, pi) => {
      document.getElementById(`pname-${m}-${pi}`).value = p.name  || '';
      document.getElementById(`pcoin-${m}-${pi}`).value = p.coins || '';
    });
  });
}

// ── Apply global total to all managers ───────────────
function applyGlobalTotal() {
  const val = document.getElementById('globalTotal').value;
  if (!val) return;
  for (let m = 0; m < NUM_MANAGERS; m++) {
    document.getElementById(`mtotal-${m}`).value = val;
  }
  recalcAll();
  saveData();
}

// ── Reset ─────────────────────────────────────────────
function resetAll() {
  if (!confirm('All data will be cleared. Continue?')) return;
  localStorage.removeItem(STORAGE_KEY);
  document.getElementById('globalTotal').value = '';
  for (let m = 0; m < NUM_MANAGERS; m++) {
    document.getElementById(`mname-${m}`).value  = '';
    document.getElementById(`mtotal-${m}`).value = '';
    for (let p = 0; p < NUM_PLAYERS; p++) {
      document.getElementById(`pname-${m}-${p}`).value = '';
      document.getElementById(`pcoin-${m}-${p}`).value = '';
    }
    recalcManager(m);
  }
}
